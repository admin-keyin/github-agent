name: AI YouTube Music Video Generator

on:
  schedule:
    - cron: '0 0 * * 0' # 주 1회 (일요일 자정) 실행
  workflow_dispatch: # 수동 실행 가능
    inputs:
      prompt:
        description: 'AI 이미지 생성 프롬프트 (비워두면 랜덤)'
        required: false
        default: ''
      music_url:
        description: '무료 음악 MP3 URL (비워두면 랜덤)'
        required: false
        default: ''

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests "moviepy<2.0.0" google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Generate Music Video
        env:
          IMAGE_PROMPT: ${{ github.event.inputs.prompt }}
          MUSIC_URL: ${{ github.event.inputs.music_url }}
        run: |
          python scripts/generate_music_video.py

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          VIDEO_TITLE: "AI Music Video: ${{ github.event.inputs.prompt || 'Chill Vibes' }}"
          VIDEO_DESCRIPTION: "Generated by GitHub Actions using Pollinations.ai and MoviePy."
        run: |
          python scripts/upload_to_youtube.py output_music_video.mp4
