name: Email-to-Code Agent
on:
  repository_dispatch:
    types: [email-task]

jobs:
  develop:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          python3 -m pip install requests duckduckgo-search

      - name: Check Ollama Status
        run: |
          echo "Checking if Ollama is running locally..."
          curl -s http://localhost:11434/api/tags || (echo "Ollama is NOT running!" && exit 1)

      - name: Run Agent Logic
        env:
          TASK_ID: ${{ github.event.client_payload.id }}
          TASK_SUBJECT: ${{ github.event.client_payload.subject }}
          TASK_BODY: ${{ github.event.client_payload.body }}
          SENDER: ${{ github.event.client_payload.from }}
          GITHUB_PAT: ${{ secrets.MY_GITHUB_PAT }} # 기본 토큰 대신 수동 등록한 PAT 사용
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OLLAMA_MODEL: "qwen2.5-coder:3b"
        run: |
          python3 agent/developer.py
