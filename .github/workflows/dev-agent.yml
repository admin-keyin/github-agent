name: Email-to-Code Agent
on:
  repository_dispatch:
    types: [email-task]

jobs:
  develop:
    runs-on: self-hosted
    permissions: # PR 생성을 위해 추가적인 권한 부여
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          python3 -m pip install requests

      - name: Check Ollama Status
        run: |
          echo "Checking if Ollama is running locally..."
          curl -s http://localhost:11434/api/tags || (echo "Ollama is NOT running!" && exit 1)

      - name: Run Agent Logic
        env:
          TASK_ID: ${{ github.event.client_payload.id }}
          TASK_SUBJECT: ${{ github.event.client_payload.subject }}
          TASK_BODY: ${{ github.event.client_payload.body }}
          SENDER: ${{ github.event.client_payload.from }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OLLAMA_MODEL: "qwen2.5-coder:7b"
        run: |
          python3 agent/developer.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: ${{ github.event.client_payload.subject }} 구현"
          title: "🚀 [에이전트] ${{ github.event.client_payload.subject }}"
          body: |
            ## 에이전트 자동화 작업
            - **작업 ID**: ${{ github.event.client_payload.id }}
            - **발신자**: ${{ github.event.client_payload.from }}
            - **내용**: ${{ github.event.client_payload.body }}
            
            ---
            *이 PR은 AI 개발 에이전트에 의해 자동 생성되었습니다.*
          branch: "agent/feature-${{ github.event.client_payload.id }}"
          base: main
          delete-branch: true # 작업 완료 후 브랜치 삭제 옵션 추가
